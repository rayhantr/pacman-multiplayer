# Render Blueprint — deploys the whole game as one persistent Node web service
# (serves the built client + Socket.IO from the same origin). Create via
# Render dashboard: New → Blueprint → pick this repo.
services:
  - type: web
    name: pacman-multiplayer
    runtime: node
    plan: free
    # yarn installs devDependencies regardless of NODE_ENV, so the build gets
    # typescript/vite without any extra flag.
    buildCommand: yarn install --frozen-lockfile && yarn build
    startCommand: yarn start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.19.0
